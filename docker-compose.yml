version: '3.8'

services:
  evoconnect:
    build:
      context: .
      dockerfile: Dockerfile
    image: evoconnect-dashboard:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - BASE_URL=https://painel.dmove.com.br
    volumes:
      - evoconnect_data:/app/data
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  evoconnect_data:
