version: '3.8'

services:
  evoconnect:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npx -y degit Dmove-Marketing/evoconnect-dashboard /app && npm install && node server.js"
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - BASE_URL=https://painel.dmove.com.br
    volumes:
      - evoconnect_data:/app/data
    networks:
      - server3net
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=server3net"
        - "traefik.http.routers.evoconnect.rule=Host(`painel.dmove.com.br`)"
        - "traefik.http.routers.evoconnect.entrypoints=web,websecure"
        - "traefik.http.routers.evoconnect.tls=true"
        - "traefik.http.services.evoconnect.loadbalancer.server.port=3000"

volumes:
  evoconnect_data:

networks:
  server3net:
    external: true
